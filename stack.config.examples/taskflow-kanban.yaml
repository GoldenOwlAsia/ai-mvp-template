# Kanban / TaskFlow tutorial stack — copy for tutorial/prompts-trello/
# Generic default: stack.config.examples/nestjs-react.yaml

project:
  name: taskflow
  slug: taskflow
  locale: en
  packageManager: pnpm
  node: "20"
  monorepo: true

frontend:
  appDir: apps/web
  language: typescript
  framework: react-vite
  frameworkVersion: "18.3.1"
  bundler: vite
  bundlerVersion: "5.4.11"
  styling: tailwindcss
  ui: shadcn
  packages:
    react: "18.3.1"
    react-dom: "18.3.1"
    "@tanstack/react-query": "5.59.0"
    zustand: "5.0.0"
    axios: "1.7.7"
    react-hook-form: "7.53.0"
    zod: "3.23.8"
    "@hookform/resolvers": "3.9.0"
    "react-router-dom": "6.26.2"
    "lucide-react": "0.441.0"
    "class-variance-authority": "0.7.0"
    clsx: "2.1.1"
    "tailwind-merge": "2.5.2"
    "@dnd-kit/core": "6.1.0"
    "@dnd-kit/sortable": "8.0.0"
    "@dnd-kit/utilities": "3.2.2"
    vite: "5.4.11"
    "@vitejs/plugin-react": "4.3.2"
    typescript: "5.6.2"
    tailwindcss: "3.4.13"
    postcss: "8.4.47"
    autoprefixer: "10.4.20"
    "@types/react": "18.3.11"
    "@types/react-dom": "18.3.1"

backend:
  appDir: apps/api
  language: typescript
  framework: nestjs
  frameworkVersion: "10.4.4"
  orm: prisma
  ormVersion: "5.20.0"
  packages:
    "@nestjs/common": "10.4.4"
    "@nestjs/core": "10.4.4"
    "@nestjs/platform-express": "10.4.4"
    "@nestjs/config": "3.2.3"
    "@nestjs/jwt": "10.2.0"
    "@nestjs/passport": "10.0.3"
    "@nestjs/swagger": "7.4.2"
    passport: "0.7.0"
    "passport-jwt": "4.0.1"
    "cookie-parser": "1.4.6"
    bcrypt: "5.1.1"
    "class-validator": "0.14.1"
    "class-transformer": "0.5.1"
    "@prisma/client": "5.20.0"
    prisma: "5.20.0"
    express: "4.21.1"
    "@nestjs/mapped-types": "2.0.5"
    "@types/node": "20.16.10"
    "@types/express": "4.17.21"
    "@types/bcrypt": "5.0.2"
    "@types/cookie-parser": "1.4.7"
    "@types/passport-jwt": "4.0.1"
    typescript: "5.6.2"
    "@nestjs/cli": "10.4.5"
    "@nestjs/schematics": "10.1.4"
    "ts-node": "10.9.2"
    "tsconfig-paths": "4.2.0"
    "source-map-support": "0.5.21"
    "ts-loader": "9.5.1"
    rxjs: "7.8.1"
    reflect-metadata: "0.2.2"

database:
  engine: postgresql
  provider: local-docker
  redis: false

deploy:
  web: vercel
  api: render
  container: docker

tooling:
  typescript: "5.6.2"
  eslint: "9.11.1"
  prettier: "3.3.3"
  test:
    frontend: vitest
    backend: jest

features:
  auth: true
  softDelete: true
  fileUpload: false
  jobs: false
  observability: false

constraints:
  allowNewDependencies: false
  pinExactVersions: true
  forbidAny: true
