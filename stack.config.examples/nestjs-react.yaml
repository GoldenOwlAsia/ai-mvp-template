# Default: NestJS + React/Vite — see stacks/catalog.json
# Switch backend: copy stack.config.examples/laravel-react.yaml or django-react.yaml

project:
  name: my-app
  slug: my-app
  locale: en
  packageManager: pnpm
  node: "20"
  monorepo: true

frontend:
  appDir: apps/web
  language: typescript
  framework: react-vite
  frameworkVersion: "18.3.1"
  bundler: vite
  bundlerVersion: "5.4.11"
  styling: tailwindcss
  ui: shadcn
  packages:
    react: "18.3.1"
    react-dom: "18.3.1"
    "@tanstack/react-query": "5.59.0"
    zustand: "5.0.0"
    axios: "1.7.7"
    react-hook-form: "7.53.0"
    zod: "3.23.8"
    "@hookform/resolvers": "3.9.0"
    "react-router-dom": "6.26.2"
    "lucide-react": "0.441.0"
    "class-variance-authority": "0.7.0"
    clsx: "2.1.1"
    "tailwind-merge": "2.5.2"

backend:
  appDir: apps/api
  language: typescript
  framework: nestjs
  frameworkVersion: "10.4.4"
  orm: prisma
  ormVersion: "5.20.0"
  packages:
    "@nestjs/common": "10.4.4"
    "@nestjs/core": "10.4.4"
    "@nestjs/platform-express": "10.4.4"
    "@nestjs/config": "3.2.3"
    "@nestjs/jwt": "10.2.0"
    "@nestjs/passport": "10.0.3"
    "@nestjs/swagger": "7.4.2"
    passport: "0.7.0"
    "passport-jwt": "4.0.1"
    "cookie-parser": "1.4.6"
    bcrypt: "5.1.1"
    "class-validator": "0.14.1"
    "class-transformer": "0.5.1"
    "@prisma/client": "5.20.0"
    rxjs: "7.8.1"
    reflect-metadata: "0.2.2"

database:
  engine: postgresql
  provider: local-docker
  redis: false

deploy:
  # See deploy/PLATFORM-GUIDE.md when changing providers
  web: vercel
  api: railway
  container: docker

tooling:
  typescript: "5.6.2"
  eslint: "9.11.1"
  prettier: "3.3.3"
  test:
    frontend: vitest
    backend: jest

features:
  auth: true
  softDelete: true
  fileUpload: false
  jobs: false
  observability: false

constraints:
  allowNewDependencies: false
  pinExactVersions: true
  forbidAny: true
